## 核心结论

### 资产配置

| 市场 | 结论 |
|------|------|
| **美股** | 所有策略跑不赢纯买 SPY，但回撤能缩一半。追求收益选 70/30 季度+25%止损，追求安稳选永久组合经典配置 |
| **A 股** | 所有策略都能跑赢沪深300！永久组合（股债金各1/3）年化 **7.38%**，远超基准 2.50% |
| **止损** | 在两个市场都效果有限 |
| **频率** | 年度再平衡最省心，和月度/季度差别不大 |
