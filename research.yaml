uv run engine.py --config examples/us_stockbond.yaml

# A 股股债
uv run engine.py --config examples/cn_stockbond.yaml

# 永久组合
uv run engine.py --config examples/us_permanent.yaml

# 红利 ETF
uv run engine.py --config examples/cn_dividend.yaml
```

