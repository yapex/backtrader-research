# Backtrader Research

帮普通用户找最优资产配置的回测框架。

## 核心问题

> 选好 ETF 和债券后，**按什么比例、多久调一次、要不要止损**，收益最高、回撤最小？

## 项目路径

```
/Users/yapex/workspace/backtrader-research
```

## 快速开始

```bash
cd /Users/yapex/workspace/backtrader-research
uv sync

# ===== 资产配置回测 =====
# 单个 profile
uv run engine.py --profile 6040_Q_none

# 批量穷举
bash sweep.sh

# 查看排名
sort -t$'\t' -k2 -rn results/results_*.tsv | head -20

# ===== 定投回测 =====
# 固定总额模式（100万，先投50万，剩下的每月5万）
uv run dca_engine.py --config examples/dca_cn300_fixed.yaml

# 无限定投模式（每月5000）
uv run dca_engine.py --config examples/dca_cn300_infinite.yaml

# 美股周频（每周一投500美元）
uv run dca_engine.py --config examples/dca_sp500_weekly.yaml
```

## 模式一：资产配置回测

### 三维度搜索空间

| 维度 | 选项 | 用户理解 |
|------|------|---------|
| **比例** | 70/30、60/40、50/50、40/60、30/70 | 股票占多少，债券占多少 |
| **频率** | 月度(M)、季度(Q)、年度(Y) | 多久调一次 |
| **止损** | 无、10%、15%、20%、25% | 跌多少就跑 |

共 5 × 3 × 5 = **75 种组合**。

### 评分规则

score = 夏普比率，带惩罚和奖励：
- 最大回撤 > 30%: score -= 0.1
- 最大回撤 > 40%: score -= 0.3
- 跑赢基准: score += 0.05
- 超额收益 > 1%: score += 0.05

### 已有实验数据

| 数据集 | 标的 | 组合数 |
|--------|------|--------|
| 美股股债 | SPY + TLT | 75 |
| A 股股债 | 510300.SS + 国债 | 75 |
| 美股永久组合 | SPY + TLT + GLD + MINT | 21 |
| A 股永久组合 | 沪深300 + 国债 + 黄金 | 21 |
| A 股红利ETF | 红利ETF + 国债 | 45 |

### 示例配置

