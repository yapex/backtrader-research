## 模式二：定投回测

### 两种模式

| 模式 | 说明 |
|------|------|
| **固定总额** | 总资本预设，先一次性投 X%，剩余按月/周定额投完，投完继续追踪 |
| **无限定投** | 没有总额，持续按周/月投入，直到回测结束 |

### 配置参数

```yaml
dca:
  mode: "fixed"              # "fixed" | "infinite"
  total_capital: 1000000    # 总资本（fixed 模式）
  lump_sum: 500000          # 初始一次性投入
  amount: 50000             # 每次定投金额
  freq: "monthly"           # "weekly" | "monthly"
  day: 1                    # 每周几(0=周一) 或 每月几号(1~28)
```

### 输出指标

| 指标 | 说明 |
|------|------|
| 累计投入 | 总共投入本金 |
| 累计份额 | 总买入份额 |
| 平均成本 | 累计投入 / 累计份额 |
| 期末市值 | 最新净值 × 份额 |
| 总收益率 | (市值 - 累计投入) / 累计投入 |
| 年化收益率 | 复利年化 |
| IRR | 内部收益率 |
| 最大回撤 | 过程最大浮亏 |
| vs 一次性投入 | 定投 vs 期初全部投入的收益对比 |

